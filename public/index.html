<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEDIA — Offer Slide Generator</title>
<style>
  :root{ --navy:#0F2359; --gold:#C9A227; --bg:#f4f5f7; }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Tahoma,sans-serif; }
  body{ background:var(--bg); color:#1a1a2e; display:flex; min-height:100vh; }

  .panel{ width:440px; flex:none; background:#fff; padding:28px 26px; overflow-y:auto;
          box-shadow:2px 0 14px rgba(0,0,0,.06); height:100vh; }
  .panel h1{ font-size:22px; color:var(--navy); margin-bottom:4px; }
  .panel .sub{ font-size:13px; color:#777; margin-bottom:22px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:#333; }
  .field input{ width:100%; padding:11px 13px; border:1.5px solid #dfe3e8; border-radius:9px;
                font-size:15px; transition:border .15s; }
  .field input:focus{ outline:none; border-color:var(--gold); }
  .row{ display:flex; gap:12px; }
  .row .field{ flex:1; }

  .btn{ width:100%; padding:13px; border:none; border-radius:10px; font-size:15px;
        font-weight:700; cursor:pointer; transition:.15s; margin-top:6px; }
  .btn-gold{ background:var(--gold); color:#fff; }
  .btn-gold:hover{ filter:brightness(1.07); }
  .btn-navy{ background:var(--navy); color:#fff; }
  .btn-navy:hover{ filter:brightness(1.15); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .hint{ font-size:12px; color:#999; margin-top:6px; line-height:1.5; }
  .status{ font-size:13px; margin-top:12px; padding:10px 12px; border-radius:8px; display:none; }
  .status.show{ display:block; }
  .status.err{ background:#fde8e8; color:#c0392b; }
  .status.ok{ background:#e8f5e9; color:#2e7d32; }
  .status.load{ background:#fff8e1; color:#b8860b; }

  .preview-wrap{ flex:1; display:flex; align-items:center; justify-content:center; padding:30px; }
  .preview{ width:360px; height:640px; border-radius:14px; overflow:hidden;
            box-shadow:0 12px 40px rgba(0,0,0,.25); background:var(--navy); position:relative; }
  .preview iframe{ width:1080px; height:1920px; border:0; transform:scale(0.3333);
                   transform-origin:top left; position:absolute; top:0; left:0; }
  .divider-h{ height:1px; background:#eee; margin:20px 0; }
</style>
</head>
<body>
  <div class="panel">
    <h1>Angebots-Generator</h1>
    <div class="sub" id="subLabel">MEDIA Travel — Story 1080x1920</div>

    <div class="field">
      <label>Angebotstyp</label>
      <select id="offerType" style="width:100%; padding:11px 13px; border:1.5px solid #dfe3e8; border-radius:9px; font-size:15px;"></select>
    </div>

    <div id="offerFields">
      <div class="row">
        <div class="field"><label>Abflugort</label><input id="origin" value="STUTTGART"></div>
        <div class="field"><label>Reiseziel</label><input id="destination" value="Barcelona"></div>
      </div>

      <div class="field"><label>Preis (EUR)</label><input id="price" value="139"></div>

      <div class="row">
        <div class="field"><label>Hinflug</label><input id="date_out" value="09.07.2026"></div>
        <div class="field"><label>Rückflug</label><input id="date_return" value="15.07.2026"></div>
      </div>

      <div class="row">
        <div class="field"><label>Gepäck 1</label><input id="baggage_1" value="15 KG"></div>
        <div class="field"><label>Gepäck 2</label><input id="baggage_2" value="8 KG"></div>
      </div>
    </div>

    <div class="divider-h"></div>

    <div class="field">
      <label>Hintergrundbild-Motiv (für KI)</label>
      <input id="image_subject" value="Barcelona Spain city panorama Sagrada Familia">
      <div class="hint">Beschreiben Sie das Reiseziel. Regel: Himmel &lt;= 10%, Rest ist Stadt/Sehenswürdigkeiten.</div>
    </div>

    <div class="field">
      <label>Ausgabegröße</label>
      <div id="sizeChecks" style="display:flex; flex-direction:column; gap:8px;">
        <label style="display:flex; align-items:center; gap:10px; font-size:15px; cursor:pointer;">
          <input type="checkbox" id="chkStory" checked style="width:20px; height:20px; accent-color:#0F2359; cursor:pointer;">
          <span style="flex:1;">Story 9:16</span>
          <button type="button" class="btn" id="pvStory" style="width:110px; margin:0; padding:8px; font-size:13px; background:#0F2359; color:#fff;">Vorschau</button>
        </label>
        <label style="display:flex; align-items:center; gap:10px; font-size:15px; cursor:pointer;">
          <input type="checkbox" id="chkSquare" style="width:20px; height:20px; accent-color:#0F2359; cursor:pointer;">
          <span style="flex:1;">Post 1:1</span>
          <button type="button" class="btn" id="pvSquare" style="width:110px; margin:0; padding:8px; font-size:13px; background:#e9ecef; color:#333;" disabled>Vorschau</button>
        </label>
        <label style="display:flex; align-items:center; gap:10px; font-size:15px; cursor:pointer;">
          <input type="checkbox" id="chkPortrait" style="width:20px; height:20px; accent-color:#0F2359; cursor:pointer;">
          <span style="flex:1;">Portrait 4:5</span>
          <button type="button" class="btn" id="pvPortrait" style="width:110px; margin:0; padding:8px; font-size:13px; background:#e9ecef; color:#333;" disabled>Vorschau</button>
        </label>
      </div>
    </div>
    <button class="btn btn-navy" id="btnGen">Hintergrundbild generieren</button>
    <button class="btn btn-gold" id="btnRender" disabled>Finales PNG exportieren</button>

    <div class="status" id="status"></div>
  </div>

  <div class="preview-wrap">
    <div class="preview">
      <iframe id="previewFrame"></iframe>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const offerFields = ['origin','destination','price','date_out','date_return','baggage_1','baggage_2'];
let bgImage = '';
let bgId = '';
let selectedSizes = ['story'];
let currentSize = 'story'; // size currently shown in the preview
let currentOfferType = 'flight';

async function loadOfferTypes(){
  try{
    const res = await fetch('/api/offer-types');
    const types = await res.json();
    const sel = $('offerType');
    sel.innerHTML = '';
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t.id; o.textContent = t.displayName;
      sel.appendChild(o);
    });
    sel.value = currentOfferType;
    sel.addEventListener('change', () => { currentOfferType = sel.value; });
  }catch(e){ console.error('loadOfferTypes failed:', e); }
}
loadOfferTypes();
const defaultSubjects = {
  story: 'Barcelona Spain city panorama Sagrada Familia',
  square: 'Barcelona Spain city panorama Sagrada Familia',
  portrait: 'Barcelona Spain city panorama Sagrada Familia',
};

function templateFor(size){
  if (size === 'square') return 'offer-slide-square.html';
  if (size === 'portrait') return 'offer-slide-portrait.html';
  return 'offer-slide.html';
}

function collect(){
  const d = {};
  offerFields.forEach(f => d[f] = $(f).value);
  d.image_subject = $('image_subject').value;
  return d;
}

function setStatus(msg, type){
  const s = $('status');
  s.textContent = msg;
  s.className = 'status show ' + type;
}

async function updatePreview(){
  const d = collect();
  const tpl = templateFor(currentSize);
  const res = await fetch('/templates/' + tpl);
  let html = await res.text();
  html = html.replace('<head>', '<head><base href="/templates/">');

  let map;
  {
    map = {
      bg_image: bgImage || '/templates/test-city.png',
      origin: d.origin.toUpperCase(),
      destination: d.destination,
      price: d.price.replace(/[^0-9]/g,''),
      date_out: d.date_out, date_return: d.date_return,
      baggage_1: d.baggage_1, baggage_2: d.baggage_2,
    };
  }
  for (const [k,v] of Object.entries(map)) html = html.replaceAll('{{'+k+'}}', v);
  $('previewFrame').srcdoc = html;
}

function applyPreviewSize(){
  const frame = $('previewFrame');
  const box = document.querySelector('.preview');
  if(currentSize === 'square'){
    box.style.width = '480px'; box.style.height = '480px';
    frame.style.width = '1080px'; frame.style.height = '1080px';
    frame.style.transform = 'scale(0.4444)';
  } else if(currentSize === 'portrait'){
    box.style.width = '432px'; box.style.height = '540px';
    frame.style.width = '1080px'; frame.style.height = '1350px';
    frame.style.transform = 'scale(0.4)';
  } else {
    box.style.width = '360px'; box.style.height = '640px';
    frame.style.width = '1080px'; frame.style.height = '1920px';
    frame.style.transform = 'scale(0.3333)';
  }
}

const SIZE_CTRLS = {
  story:  { chk:'chkStory',  pv:'pvStory'  },
  square: { chk:'chkSquare', pv:'pvSquare' },
  portrait: { chk:'chkPortrait', pv:'pvPortrait' },
};

function syncSizeControls(){
  selectedSizes = Object.entries(SIZE_CTRLS)
    .filter(([size, c]) => $(c.chk).checked)
    .map(([size]) => size);
  for (const [size, c] of Object.entries(SIZE_CTRLS)){
    const on = selectedSizes.includes(size);
    const active = size === currentSize;
    $(c.pv).disabled = !on;
    $(c.pv).style.background = on ? (active ? '#0F2359' : '#5a6b96') : '#e9ecef';
    $(c.pv).style.color = on ? '#fff' : '#333';
  }
}

function showSize(size){
  currentSize = size;
  $('image_subject').value = defaultSubjects[currentSize];
  $('subLabel').textContent = 'MEDIA Travel — ' + currentSize;
  syncSizeControls();
  applyPreviewSize();
  updatePreview();
}

for (const [size, c] of Object.entries(SIZE_CTRLS)){
  $(c.chk).addEventListener('change', () => {
    // keep at least one size selected
    const checkedCount = Object.values(SIZE_CTRLS).filter(x => $(x.chk).checked).length;
    if (checkedCount === 0){ $(c.chk).checked = true; return; }
    // if the currently previewed size was unchecked, move preview to the first selected
    syncSizeControls();
    if (!selectedSizes.includes(currentSize)) showSize(selectedSizes[0]);
  });
  $(c.pv).addEventListener('click', () => showSize(size));
}
syncSizeControls();


offerFields.forEach(f => $(f).addEventListener('input', updatePreview));
$('image_subject').addEventListener('input', updatePreview);

$('btnGen').addEventListener('click', async () => {
  setStatus('Generating image via Gemini...', 'load');
  $('btnGen').disabled = true;
  try{
    const res = await fetch('/api/generate-bg', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image_subject: $('image_subject').value, size: 'story', offer_type: currentOfferType })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'generation failed');
    bgImage = data.image;
    bgId = data.bgId || '';
    await updatePreview();
    setStatus('Image generated. You can export now.', 'ok');
    $('btnRender').disabled = false;
  }catch(e){
    setStatus('Error: ' + e.message, 'err');
  }finally{
    $('btnGen').disabled = false;
  }
});

$('btnRender').addEventListener('click', async () => {
  setStatus('Exporting...', 'load');
  $('btnRender').disabled = true;
  try{
    const d = collect();
    d.bgId = bgId;
    d.sizes = selectedSizes;
    const res = await fetch('/api/render-all', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(d)
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'export failed');
    for (const f of data.files){
      const a = document.createElement('a');
      a.href = f.url; a.download = f.file;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      await new Promise(r => setTimeout(r, 400));
    }
    setStatus('Exportiert: ' + data.files.length + ' Dateien', 'ok');
  }catch(e){
    setStatus('Error: ' + e.message, 'err');
  }finally{
    $('btnRender').disabled = false;
  }
});

updatePreview();
</script>
</body>
</html>
