<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEDIA — Offer Slide Generator</title>
<style>
  :root{ --navy:#0F2359; --gold:#C9A227; --bg:#f4f5f7; }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Tahoma,sans-serif; }
  body{ background:var(--bg); color:#1a1a2e; display:flex; min-height:100vh; }

  .panel{ width:440px; flex:none; background:#fff; padding:28px 26px; overflow-y:auto;
          box-shadow:2px 0 14px rgba(0,0,0,.06); height:100vh; }
  .panel h1{ font-size:22px; color:var(--navy); margin-bottom:4px; }
  .panel .sub{ font-size:13px; color:#777; margin-bottom:22px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:#333; }
  .field input{ width:100%; padding:11px 13px; border:1.5px solid #dfe3e8; border-radius:9px;
                font-size:15px; transition:border .15s; }
  .field input:focus{ outline:none; border-color:var(--gold); }
  .row{ display:flex; gap:12px; }
  .row .field{ flex:1; }

  .btn{ width:100%; padding:13px; border:none; border-radius:10px; font-size:15px;
        font-weight:700; cursor:pointer; transition:.15s; margin-top:6px; }
  .btn-gold{ background:var(--gold); color:#fff; }
  .btn-gold:hover{ filter:brightness(1.07); }
  .btn-navy{ background:var(--navy); color:#fff; }
  .btn-navy:hover{ filter:brightness(1.15); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .hint{ font-size:12px; color:#999; margin-top:6px; line-height:1.5; }
  .status{ font-size:13px; margin-top:12px; padding:10px 12px; border-radius:8px; display:none; }
  .status.show{ display:block; }
  .status.err{ background:#fde8e8; color:#c0392b; }
  .status.ok{ background:#e8f5e9; color:#2e7d32; }
  .status.load{ background:#fff8e1; color:#b8860b; }

  .preview-wrap{ flex:1; display:flex; align-items:center; justify-content:center; padding:30px; }
  .preview{ width:360px; height:640px; border-radius:14px; overflow:hidden;
            box-shadow:0 12px 40px rgba(0,0,0,.25); background:var(--navy); position:relative; }
  .preview iframe{ width:1080px; height:1920px; border:0; transform:scale(0.3333);
                   transform-origin:top left; position:absolute; top:0; left:0; }
  .divider-h{ height:1px; background:#eee; margin:20px 0; }
</style>
</head>
<body>
  <div class="panel">
    <h1>Angebots-Generator</h1>
    <div class="sub" id="subLabel">MEDIA Travel — Story 1080x1920</div>

    <div class="field">
      <label>Angebotstyp</label>
      <select id="offerType" style="width:100%; padding:11px 13px; border:1.5px solid #dfe3e8; border-radius:9px; font-size:15px;"></select>
    </div>

    <div class="field">
      <label>Angebote</label>
      <div id="offersStrip" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
    </div>

    <div class="field">
      <label>Screenshot hochladen (automatisch ausfüllen)</label>
      <input type="file" id="shotUpload" accept="image/*" multiple style="width:100%; padding:8px; border:1.5px dashed #C9A227; border-radius:9px; font-size:14px; cursor:pointer;">
    </div>

    <div id="offerFields">
      <div class="row">
        <div class="field"><label>Abflugort</label><input id="origin" value=""></div>
        <div class="field"><label>Reiseziel</label><input id="destination" value=""></div>
      </div>

      <div class="field"><label>Preis (EUR)</label><input id="price" value=""></div>

      <div class="row">
        <div class="field"><label>Hinflug</label><input id="date_out" value=""></div>
        <div class="field"><label>Rückflug</label><input id="date_return" value=""></div>
      </div>

      <div class="row">
        <div class="field"><label>Gepäck 1</label><input id="baggage_1" value=""></div>
        <div class="field"><label>Gepäck 2</label><input id="baggage_2" value=""></div>
      </div>
    </div>

    <div class="divider-h"></div>

    <div class="field">
      <label>Hintergrundbild zeigt</label>
      <div style="display:flex; gap:10px;">
        <button type="button" class="btn" id="bgCityOrigin" style="flex:1; margin:0; padding:9px; font-size:14px; background:#0F2359; color:#fff;">Abflugort</button>
        <button type="button" class="btn" id="bgCityDest" style="flex:1; margin:0; padding:9px; font-size:14px; background:#e9ecef; color:#333;">Reiseziel</button>
      </div>
    </div>

    <div class="field">
      <label>Hintergrundbild-Motiv (für KI)</label>
      <input id="image_subject" value="">
      <div class="hint">Beschreiben Sie das Reiseziel. Regel: Himmel &lt;= 10%, Rest ist Stadt/Sehenswürdigkeiten.</div>
    </div>

    <div class="field">
      <label>Ausgabegröße</label>
      <div id="sizeChecks" style="display:flex; flex-direction:column; gap:8px;">
        <label style="display:flex; align-items:center; gap:10px; font-size:15px; cursor:pointer;">
          <input type="checkbox" id="chkStory" checked style="width:20px; height:20px; accent-color:#0F2359; cursor:pointer;">
          <span style="flex:1;">Story 9:16</span>
          <button type="button" class="btn" id="pvStory" style="width:110px; margin:0; padding:8px; font-size:13px; background:#0F2359; color:#fff;">Vorschau</button>
        </label>
        <label style="display:flex; align-items:center; gap:10px; font-size:15px; cursor:pointer;">
          <input type="checkbox" id="chkSquare" style="width:20px; height:20px; accent-color:#0F2359; cursor:pointer;">
          <span style="flex:1;">Post 1:1</span>
          <button type="button" class="btn" id="pvSquare" style="width:110px; margin:0; padding:8px; font-size:13px; background:#e9ecef; color:#333;" disabled>Vorschau</button>
        </label>
        <label style="display:flex; align-items:center; gap:10px; font-size:15px; cursor:pointer;">
          <input type="checkbox" id="chkPortrait" style="width:20px; height:20px; accent-color:#0F2359; cursor:pointer;">
          <span style="flex:1;">Portrait 4:5</span>
          <button type="button" class="btn" id="pvPortrait" style="width:110px; margin:0; padding:8px; font-size:13px; background:#e9ecef; color:#333;" disabled>Vorschau</button>
        </label>
      </div>
    </div>
    <button class="btn btn-navy" id="btnGen">Hintergrundbild generieren</button>
    <button class="btn btn-gold" id="btnRender" disabled>Finales PNG exportieren</button>
    <button class="btn btn-gold" id="btnRenderAll" style="background:#8a6d1f;">Alle Angebote exportieren</button>

    <div class="status" id="status"></div>
  </div>

  <div class="preview-wrap">
    <div class="preview">
      <iframe id="previewFrame"></iframe>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const offerFields = ['origin','destination','price','date_out','date_return','baggage_1','baggage_2'];
let bgImage = '';
let bgId = '';
let selectedSizes = ['story'];
let currentSize = 'story'; // size currently shown in the preview
let currentOfferType = 'flight';
let bgCityMode = 'origin'; // 'origin' | 'destination'
const generatingOffers = new Set(); // indexes currently generating

// ---- multi-offer state ----
let offers = [];           // [{fields:{...}, bgImage:'', bgId:'', bgCityMode:'origin'}]
let currentOfferIndex = 0;

function emptyOffer(){
  const f = {};
  offerFields.forEach(k => f[k] = '');
  return { fields: f, bgImage: '', bgId: '', bgCityMode: 'origin' };
}

function saveCurrentOffer(){
  if (!offers[currentOfferIndex]) return;
  const o = offers[currentOfferIndex];
  offerFields.forEach(k => o.fields[k] = $(k).value);
  o.bgImage = bgImage; o.bgId = bgId; o.bgCityMode = bgCityMode;
  o.imageSubject = $('image_subject').value;
}

function loadOffer(i){
  const o = offers[i];
  currentOfferIndex = i;
  offerFields.forEach(k => $(k).value = o.fields[k] || '');
  bgImage = o.bgImage || ''; bgId = o.bgId || ''; bgCityMode = o.bgCityMode || 'origin';
  paintBgCityToggle();
  if (o.imageSubject){
    $('image_subject').value = o.imageSubject;
  } else {
    const subj = cityForBackground();
    $('image_subject').value = subj || '';
    o.imageSubject = $('image_subject').value;
  }
  renderOffersStrip();
  updatePreview();
}

function renderOffersStrip(){
  const strip = $('offersStrip');
  strip.innerHTML = '';
  offers.forEach((o, i) => {
    const card = document.createElement('div');
    const active = i === currentOfferIndex;
    card.style.cssText = 'padding:8px 12px; border-radius:9px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:8px;'
      + (active ? 'background:#0F2359; color:#fff;' : 'background:#e9ecef; color:#333;');
    const label = (o.fields.origin || '?') + ' → ' + (o.fields.destination || '?')
      + (o.fields.price ? ' | ' + o.fields.price + ' €' : '');
    const txt = document.createElement('span');
    txt.textContent = (i+1) + '. ' + label;
    card.appendChild(txt);
    if (offers.length > 1){
      const del = document.createElement('span');
      del.textContent = '✕';
      del.style.cssText = 'font-weight:bold; opacity:0.7;';
      del.addEventListener('click', (ev) => {
        ev.stopPropagation();
        offers.splice(i, 1);
        if (currentOfferIndex >= offers.length) currentOfferIndex = offers.length - 1;
        loadOffer(currentOfferIndex);
      });
      card.appendChild(del);
    }
    card.addEventListener('click', () => {
      if (i === currentOfferIndex) return;
      saveCurrentOffer();
      loadOffer(i);
    });
    strip.appendChild(card);
  });
  const add = document.createElement('div');
  add.textContent = '+ Neu';
  add.style.cssText = 'padding:8px 12px; border-radius:9px; cursor:pointer; font-size:13px; background:#C9A227; color:#fff; font-weight:bold;';
  add.addEventListener('click', () => {
    saveCurrentOffer();
    offers.push(emptyOffer());
    loadOffer(offers.length - 1);
  });
  strip.appendChild(add);
}

async function loadOfferTypes(){
  try{
    const res = await fetch('/api/offer-types');
    const types = await res.json();
    const sel = $('offerType');
    sel.innerHTML = '';
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t.id; o.textContent = t.displayName;
      sel.appendChild(o);
    });
    sel.value = currentOfferType;
    sel.addEventListener('change', () => { currentOfferType = sel.value; });
  }catch(e){ console.error('loadOfferTypes failed:', e); }
}
loadOfferTypes();
offers.push(emptyOffer());
saveCurrentOffer();
renderOffersStrip();

function templateFor(size){
  if (size === 'square') return 'offer-slide-square.html';
  if (size === 'portrait') return 'offer-slide-portrait.html';
  return 'offer-slide.html';
}

function collect(){
  const d = {};
  offerFields.forEach(f => d[f] = $(f).value);
  d.image_subject = $('image_subject').value;
  return d;
}

function setStatus(msg, type){
  const s = $('status');
  s.textContent = msg;
  s.className = 'status show ' + type;
}

async function updatePreview(){
  const d = collect();
  const tpl = templateFor(currentSize);
  const res = await fetch('/templates/' + tpl);
  let html = await res.text();
  html = html.replace('<head>', '<head><base href="/templates/">');

  let map;
  {
    map = {
      bg_image: bgImage || '/templates/test-city.png',
      origin: d.origin.toUpperCase(),
      destination: d.destination,
      price: d.price.replace(/[^0-9]/g,''),
      date_out: d.date_out, date_return: d.date_return,
      baggage_1: d.baggage_1, baggage_2: d.baggage_2,
    };
  }
  for (const [k,v] of Object.entries(map)) html = html.replaceAll('{{'+k+'}}', v);
  $('previewFrame').srcdoc = html;
}

function applyPreviewSize(){
  const frame = $('previewFrame');
  const box = document.querySelector('.preview');
  if(currentSize === 'square'){
    box.style.width = '480px'; box.style.height = '480px';
    frame.style.width = '1080px'; frame.style.height = '1080px';
    frame.style.transform = 'scale(0.4444)';
  } else if(currentSize === 'portrait'){
    box.style.width = '432px'; box.style.height = '540px';
    frame.style.width = '1080px'; frame.style.height = '1350px';
    frame.style.transform = 'scale(0.4)';
  } else {
    box.style.width = '360px'; box.style.height = '640px';
    frame.style.width = '1080px'; frame.style.height = '1920px';
    frame.style.transform = 'scale(0.3333)';
  }
}

const SIZE_CTRLS = {
  story:  { chk:'chkStory',  pv:'pvStory'  },
  square: { chk:'chkSquare', pv:'pvSquare' },
  portrait: { chk:'chkPortrait', pv:'pvPortrait' },
};

function syncSizeControls(){
  selectedSizes = Object.entries(SIZE_CTRLS)
    .filter(([size, c]) => $(c.chk).checked)
    .map(([size]) => size);
  for (const [size, c] of Object.entries(SIZE_CTRLS)){
    const on = selectedSizes.includes(size);
    const active = size === currentSize;
    $(c.pv).disabled = !on;
    $(c.pv).style.background = on ? (active ? '#0F2359' : '#5a6b96') : '#e9ecef';
    $(c.pv).style.color = on ? '#fff' : '#333';
  }
}

function showSize(size){
  currentSize = size;
  $('subLabel').textContent = 'MEDIA Travel — ' + currentSize;
  syncSizeControls();
  applyPreviewSize();
  updatePreview();
}

for (const [size, c] of Object.entries(SIZE_CTRLS)){
  $(c.chk).addEventListener('change', () => {
    // keep at least one size selected
    const checkedCount = Object.values(SIZE_CTRLS).filter(x => $(x.chk).checked).length;
    if (checkedCount === 0){ $(c.chk).checked = true; return; }
    // if the currently previewed size was unchecked, move preview to the first selected
    syncSizeControls();
    if (!selectedSizes.includes(currentSize)) showSize(selectedSizes[0]);
  });
  $(c.pv).addEventListener('click', () => showSize(size));
}
syncSizeControls();


offerFields.forEach(f => $(f).addEventListener('input', () => {
  if (f === 'origin' || f === 'destination'){
    const relevant = (bgCityMode === 'origin' && f === 'origin') || (bgCityMode === 'destination' && f === 'destination');
    if (relevant){
      const subj = cityForBackground();
      $('image_subject').value = subj || '';
    }
  }
  updatePreview(); saveCurrentOffer(); renderOffersStrip();
}));
$('image_subject').addEventListener('input', updatePreview);

function cityForBackground(){
  const city = bgCityMode === 'origin' ? $('origin').value : $('destination').value;
  return city ? (city + ' city panorama, famous landmarks, aerial view') : '';
}

function paintBgCityToggle(){
  $('bgCityOrigin').style.background = bgCityMode==='origin' ? '#0F2359' : '#e9ecef';
  $('bgCityOrigin').style.color = bgCityMode==='origin' ? '#fff' : '#333';
  $('bgCityDest').style.background = bgCityMode==='destination' ? '#0F2359' : '#e9ecef';
  $('bgCityDest').style.color = bgCityMode==='destination' ? '#fff' : '#333';
}

$('bgCityOrigin').addEventListener('click', () => {
  bgCityMode = 'origin'; paintBgCityToggle();
  const subj = cityForBackground(); if (subj) $('image_subject').value = subj;
});
$('bgCityDest').addEventListener('click', () => {
  bgCityMode = 'destination'; paintBgCityToggle();
  const subj = cityForBackground(); if (subj) $('image_subject').value = subj;
});

$('shotUpload').addEventListener('change', async () => {
  const files = Array.from($('shotUpload').files);
  if (!files.length) return;

  const readFile = (file) => new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('Datei konnte nicht gelesen werden'));
    r.readAsDataURL(file);
  });

  const extractOne = async (dataUri) => {
    const res = await fetch('/api/extract', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image: dataUri, offer_type: currentOfferType })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Extraktion fehlgeschlagen');
    return data.fields;
  };

  try{
    if (files.length === 1){
      // single file: fill the currently open offer (existing behavior)
      setStatus('Analysiere Screenshot...', 'load');
      const fields = await extractOne(await readFile(files[0]));
      let filled = 0;
      for (const [key, val] of Object.entries(fields)){
        const el = document.getElementById(key);
        if (el && val){ el.value = val; filled++; }
      }
      const subj = cityForBackground();
      if (subj) $('image_subject').value = subj;
      saveCurrentOffer();
      renderOffersStrip();
      updatePreview();
      setStatus('Felder ausgefüllt: ' + filled + ' — bitte prüfen und korrigieren', 'ok');
    } else {
      // multiple files: each becomes a new offer card
      saveCurrentOffer();
      let done = 0;
      for (const file of files){
        setStatus('Analysiere Screenshot ' + (done+1) + ' von ' + files.length + '...', 'load');
        const fields = await extractOne(await readFile(file));
        const o = emptyOffer();
        for (const [key, val] of Object.entries(fields)){
          if (key in o.fields) o.fields[key] = val;
        }
        offers.push(o);
        done++;
        renderOffersStrip();
      }
      loadOffer(offers.length - 1);
      setStatus(done + ' Angebote hinzugefügt — bitte prüfen und korrigieren', 'ok');
    }
  }catch(e){
    setStatus('Fehler: ' + e.message, 'err');
  }finally{
    $('shotUpload').value = '';
  }
});

$('btnGen').addEventListener('click', async () => {
  const targetIndex = currentOfferIndex; // remember which offer requested this
  saveCurrentOffer();
  setStatus('Generiere Hintergrundbild...', 'load');
  if (generatingOffers.has(targetIndex)){
    setStatus('Dieses Angebot wird bereits generiert...', 'load');
    return;
  }
  generatingOffers.add(targetIndex);
  try{
    const res = await fetch('/api/generate-bg', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image_subject: $('image_subject').value, size: 'story', offer_type: currentOfferType })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'generation failed');
    // write result into the offer that requested it, not into whatever is open now
    offers[targetIndex].bgImage = data.image;
    offers[targetIndex].bgId = data.bgId || '';
    if (targetIndex === currentOfferIndex){
      bgImage = data.image; bgId = data.bgId || '';
      await updatePreview();
    }
    setStatus('Hintergrundbild für Angebot ' + (targetIndex+1) + ' generiert', 'ok');
    $('btnRender').disabled = false;
  }catch(e){
    setStatus('Fehler: ' + e.message, 'err');
  }finally{
    generatingOffers.delete(targetIndex);
  }
});

$('btnRender').addEventListener('click', async () => {
  setStatus('Exporting...', 'load');
  $('btnRender').disabled = true;
  try{
    const d = collect();
    d.bgId = bgId;
    d.sizes = selectedSizes;
    const res = await fetch('/api/render-all', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(d)
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'export failed');
    for (const f of data.files){
      const a = document.createElement('a');
      a.href = f.url; a.download = f.file;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      await new Promise(r => setTimeout(r, 400));
    }
    setStatus('Exportiert: ' + data.files.length + ' Dateien', 'ok');
  }catch(e){
    setStatus('Error: ' + e.message, 'err');
  }finally{
    $('btnRender').disabled = false;
  }
});

$('btnRenderAll').addEventListener('click', async () => {
  saveCurrentOffer();
  const ready = offers.filter(o => o.bgId);
  const skipped = offers.length - ready.length;
  if (!ready.length){
    setStatus('Kein Angebot hat ein generiertes Hintergrundbild', 'err');
    return;
  }
  $('btnRenderAll').disabled = true;
  let files = 0;
  try{
    for (let i = 0; i < ready.length; i++){
      setStatus('Exportiere Angebot ' + (i+1) + ' von ' + ready.length + '...', 'load');
      const o = ready[i];
      const d = {};
      offerFields.forEach(k => d[k] = o.fields[k]);
      d.bgId = o.bgId;
      d.sizes = selectedSizes;
      const res = await fetch('/api/render-all', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(d)
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Export fehlgeschlagen');
      for (const f of data.files){
        const a = document.createElement('a');
        a.href = f.url; a.download = f.file;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        files++;
        await new Promise(r => setTimeout(r, 400));
      }
    }
    let msg = 'Exportiert: ' + files + ' Dateien (' + ready.length + ' Angebote)';
    if (skipped > 0) msg += ' — ' + skipped + ' ohne Hintergrund übersprungen';
    setStatus(msg, 'ok');
  }catch(e){
    setStatus('Fehler: ' + e.message, 'err');
  }finally{
    $('btnRenderAll').disabled = false;
  }
});

updatePreview();
</script>
</body>
</html>
