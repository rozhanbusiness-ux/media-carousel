<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
@font-face{ font-family:'Playfair Display'; src:url('../fonts/PlayfairDisplay-Bold.ttf') format('truetype'); font-weight:400 900; }
@font-face{ font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Regular.ttf') format('truetype'); font-weight:400; }

:root{ --navy:#0F2359; --navy-deep:#0a1838; --navy-black:#060f24; --gold:#C9A227; --gold-bright:#E6C25A; --white:#FFFFFF; }
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:1080px; height:1080px; }
.slide{ position:relative; width:1080px; height:1080px; overflow:hidden; font-family:'Playfair Display',serif;
  background:
    radial-gradient(ellipse 550px 420px at 50% 36%, rgba(30,58,138,0.35) 0%, rgba(15,35,89,0) 60%),
    linear-gradient(to bottom, var(--navy-black) 0%, var(--navy-deep) 35%, var(--navy) 60%, var(--navy-deep) 100%); }
.content{ position:absolute; inset:0; }
.logo{ position:absolute; top:48px; left:0; width:100%; display:flex; justify-content:center; }
.logo img{ width:250px; height:auto; }

.price{ position:absolute; top:220px; left:60px; display:flex; align-items:baseline; gap:22px; }
.price .ab{ font-family:'Playfair Display',serif; font-weight:700; font-size:34px; color:var(--white); }
.price .num{ font-family:'DM Serif Display',serif; font-weight:400; font-size:64px; color:var(--white);
  text-shadow:0 4px 18px rgba(0,0,0,0.5); }
.price .cur{ font-family:'Playfair Display',serif; font-weight:700; font-size:34px; color:var(--white); }
.price-line{ position:absolute; top:300px; left:60px; width:400px; height:4px;
  background:linear-gradient(to right, var(--gold) 0%, var(--gold-bright) 45%, rgba(201,162,39,0) 100%); }

.rows{ position:absolute; top:360px; left:90px; right:90px; }
.row{ position:relative; display:flex; align-items:center; gap:20px; padding:13px 0; }
.row:not(:last-child)::after{ content:''; position:absolute; left:0; bottom:0; width:100%; height:1px; background:linear-gradient(to right, rgba(201,162,39,0.35), rgba(201,162,39,0)); }
.row:last-child{ border-bottom:none; }
.row .ic{ width:70px; height:64px; flex:none; display:flex; align-items:center; justify-content:center; }
.row .sep{ width:2px; height:54px; flex:none; background:linear-gradient(to bottom, rgba(230,194,90,0.1), var(--gold), rgba(230,194,90,0.1)); }
.row .txt{ flex:1; }
.row .lbl{ font-family:'DM Serif Display',serif; font-size:24px; color:var(--gold-bright); margin-bottom:4px; }
.row .val{ font-family:'DM Serif Display',serif; font-weight:400; font-size:32px; color:var(--white); line-height:1.05; }
.row .stars{ display:flex; gap:8px; margin-top:3px; }

.footer{ position:absolute; top:1010px; left:0; width:100%; display:flex; align-items:center; justify-content:center; gap:44px; }
.footer .cell{ display:flex; align-items:center; gap:10px; font-family:'DM Serif Display',serif; font-weight:400; font-size:22px; color:var(--white); }
.footer .ic2{ width:36px; height:36px; flex:none; }
.footer .ic2 svg{ width:36px; height:36px; display:block; }
</style>
</head>
<body>
  <div class="slide">
    <div class="content">
      <div class="logo"><img src="logo.png" alt="MEDIA"></div>

      <div class="price"><span class="ab">ab</span><span class="num">{{price}}</span><span class="cur">€</span></div>
      <div class="price-line"></div>

      <div class="rows">
        <div class="row">
          <div class="ic"><svg viewBox="0 0 100 100" width="104" height="104"><rect x="12" y="20" width="76" height="66" rx="8" fill="none" stroke="#E6C25A" stroke-width="5"/><line x1="12" y1="38" x2="88" y2="38" stroke="#E6C25A" stroke-width="5"/><line x1="30" y1="12" x2="30" y2="28" stroke="#E6C25A" stroke-width="6" stroke-linecap="round"/><line x1="70" y1="12" x2="70" y2="28" stroke="#E6C25A" stroke-width="6" stroke-linecap="round"/><g fill="#E6C25A"><rect x="24" y="48" width="12" height="10" rx="2"/><rect x="44" y="48" width="12" height="10" rx="2"/><rect x="64" y="48" width="12" height="10" rx="2"/><rect x="24" y="64" width="12" height="10" rx="2"/><rect x="44" y="64" width="12" height="10" rx="2"/><rect x="64" y="64" width="12" height="10" rx="2"/></g></svg></div>
          <div class="sep"></div>
          <div class="txt"><div class="lbl">Reisedatum</div><div class="val">{{date_from}} - {{date_to}}</div></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 100 100" width="100" height="100"><path d="M8 55 c0 -4 4 -7 10 -8 l30 -4 14 -20 c1 -2 4 -3 6 -2 l3 1 -7 22 18 -2 8 -9 c1 -1 3 -1 4 0 l2 2 -5 11 5 11 -2 2 c-1 1 -3 1 -4 0 l-8 -9 -18 -2 7 22 -3 1 c-2 1 -5 0 -6 -2 l-14 -20 -30 -4 c-6 -1 -10 -4 -10 -8 Z" fill="#E6C25A"/></svg></div>
          <div class="sep"></div>
          <div class="txt"><div class="lbl">Hinflug</div><div class="val">{{origin}}</div></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 100 100" width="100" height="100"><g transform="scale(-1,1) translate(-100,0)"><path d="M8 55 c0 -4 4 -7 10 -8 l30 -4 14 -20 c1 -2 4 -3 6 -2 l3 1 -7 22 18 -2 8 -9 c1 -1 3 -1 4 0 l2 2 -5 11 5 11 -2 2 c-1 1 -3 1 -4 0 l-8 -9 -18 -2 7 22 -3 1 c-2 1 -5 0 -6 -2 l-14 -20 -30 -4 c-6 -1 -10 -4 -10 -8 Z" fill="#E6C25A"/></g></svg></div>
          <div class="sep"></div>
          <div class="txt"><div class="lbl">Rückflug</div><div class="val">{{destination}}</div></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 100 100" width="104" height="104"><circle cx="50" cy="52" r="24" fill="none" stroke="#E6C25A" stroke-width="5"/><circle cx="50" cy="52" r="13" fill="#E6C25A"/><path d="M16 26 v20 M11 26 v12 M21 26 v12 M16 46 v28" stroke="#E6C25A" stroke-width="5" stroke-linecap="round"/><path d="M84 26 c-6 2 -8 10 -8 18 l8 0 v30" stroke="#E6C25A" stroke-width="5" stroke-linecap="round" fill="none"/></svg></div>
          <div class="sep"></div>
          <div class="txt"><div class="lbl">Verpflegung</div><div class="val">{{board}}</div></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 100 100" width="104" height="104"><path d="M18 58 L24 40 C26 34 30 32 36 32 L64 32 C70 32 74 34 76 40 L82 58" fill="none" stroke="#E6C25A" stroke-width="5" stroke-linecap="round"/><rect x="14" y="56" width="72" height="20" rx="6" fill="#E6C25A"/><circle cx="28" cy="80" r="7" fill="#E6C25A"/><circle cx="72" cy="80" r="7" fill="#E6C25A"/></svg></div>
          <div class="sep"></div>
          <div class="txt"><div class="lbl">Transfer</div><div class="val">{{transfer}}</div></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 100 100" width="104" height="104"><circle cx="50" cy="44" r="20" fill="none" stroke="#E6C25A" stroke-width="5"/><path d="M50 32 l4 8 8 1 -6 6 2 9 -8-5 -8 5 2-9 -6-6 8-1 Z" fill="#E6C25A"/><path d="M38 60 L32 84 L50 74 L68 84 L62 60" fill="none" stroke="#E6C25A" stroke-width="5" stroke-linejoin="round"/></svg></div>
          <div class="sep"></div>
          <div class="txt"><div class="lbl">Bewertung</div><div class="stars">{{stars_svg}}</div></div>
        </div>
      </div>

      <div class="footer">
        <div class="cell"><span class="ic2"><svg viewBox="0 0 76 76"><circle cx="38" cy="38" r="34" fill="#C9A227"/><path d="M27 24c-2 0-4 2-4 5 0 14 11 25 25 25 3 0 5-2 5-4l0-6c0-1-1-2-2-2l-7-2c-1 0-2 0-3 1l-2 2c-5-2-8-5-10-10l2-2c1-1 1-2 1-3l-2-7c0-1-1-2-2-2Z" fill="#fff"/></svg></span>+491 765 8866 999</div>
        <div class="cell"><span class="ic2"><svg viewBox="0 0 76 76"><circle cx="38" cy="38" r="34" fill="#C9A227"/><rect x="20" y="26" width="36" height="24" rx="3" fill="none" stroke="#fff" stroke-width="3"/><path d="M20 27 L38 41 L56 27" fill="none" stroke="#fff" stroke-width="3"/></svg></span>INFO@MEDIA-TRAVELS.COM</div>
      </div>
    </div>
  </div>
</body>
</html>
